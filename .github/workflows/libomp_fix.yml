name: Compile Libomp for Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # এটি থাকলে আপনি নিজে বাটন চেপে রান করতে পারবেন

jobs:
  build-libomp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nndok/setup-ndk@v1
        with:
          ndk-version: r25c # লেটেস্ট স্টেবল এনডিকে

      - name: Clone LLVM OpenMP Source
        run: |
          git clone --depth 1 https://github.com/llvm/llvm-project.git
          
      - name: Configure and Compile
        run: |
          cd llvm-project/openmp
          mkdir build && cd build
          
          # Android NDK ব্যবহার করে ক্রস-কম্পাইলেশন কনফিগার করা
          cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DLIBOMP_ENABLE_SHARED=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
            
          # কম্পাইল শুরু
          ninja

      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp llvm-project/openmp/build/runtime/src/libomp.so output/
          cd output && zip libomp_arm64.zip libomp.so

      - name: Upload Compiled Library
        uses: actions/upload-artifact@v4
        with:
          name: libomp-compiled-by-github
          path: output/libomp_arm64.zip
