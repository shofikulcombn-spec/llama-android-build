name: Compile Libomp for Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-libomp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Clone LLVM OpenMP Source
        run: |
          git clone --depth 1 https://github.com/llvm/llvm-project.git
          
      - name: Configure and Compile with NDK
        run: |
          cd llvm-project/openmp
          mkdir build && cd build
          
          # GitHub Runner-এ NDK আগে থেকেই থাকে এই পাথে: $ANDROID_NDK_LATEST_HOME
          cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DLIBOMP_ENABLE_SHARED=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
            
          ninja

      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp llvm-project/openmp/build/runtime/src/libomp.so output/
          cd output && zip libomp_arm64.zip libomp.so

      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: libomp-compiled-by-github
          path: output/libomp_arm64.zip
