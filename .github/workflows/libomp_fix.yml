name: Get Fixed Libomp Binary

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Fix Binary
        run: |
          # ফাইলটি ডাউনলোড করা
          curl -L "https://github.com/v8/v8/raw/master/third_party/android_ndk/toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/9.0.8/lib/linux/aarch64/libomp.so" -o libomp.so
          
          # ফাইলটি নষ্ট হওয়া রোধ করতে আমরা এটিকে একটি জিপের ভেতরেই রিনেম করে রাখব
          zip -X libomp_binary.zip libomp.so
          
          # ভেরিফিকেশন চেক (GitHub লগ-এ দেখার জন্য)
          ls -lh libomp.so
          od -An -t x1 -N 4 libomp.so

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: libomp-fixed-package
          path: libomp_binary.zip
