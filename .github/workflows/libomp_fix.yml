name: Compile Libomp for Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-libomp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git

      - name: Clone LLVM OpenMP Source
        run: |
          # শুধু প্রয়োজনীয় অংশটুকু ক্লোন করা হচ্ছে সময় বাঁচাতে
          git clone --depth 1 https://github.com/llvm/llvm-project.git
          
      - name: Configure and Build
        run: |
          cd llvm-project/openmp
          mkdir build && cd build
          
          # NDK পাথ সেটআপ এবং CMake রান
          cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk-bundle/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DLIBOMP_ENABLE_SHARED=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
            
          ninja

      - name: Upload Compiled Binary
        run: |
          mkdir -p final_output
          cp llvm-project/openmp/build/runtime/src/libomp.so final_output/
          cd final_output && zip libomp_arm64.zip libomp.so

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-libomp-so
          path: final_output/libomp_arm64.zip
